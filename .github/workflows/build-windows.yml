name: Build Windows Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build win-x64 package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore CLI
        run: dotnet restore .\src\SteamHdrGuard.Cli\SteamHdrGuard.Cli.csproj

      - name: Restore GUI
        run: dotnet restore .\src\SteamHdrGuard.Gui\SteamHdrGuard.Gui.csproj

      - name: Publish CLI
        run: dotnet publish .\src\SteamHdrGuard.Cli\SteamHdrGuard.Cli.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o .\artifacts\portable\cli

      - name: Publish GUI
        run: dotnet publish .\src\SteamHdrGuard.Gui\SteamHdrGuard.Gui.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o .\artifacts\portable\gui

      - name: Add portable docs
        shell: pwsh
        run: |
          Copy-Item .\README.md .\artifacts\portable\README.md
          Copy-Item .\scripts .\artifacts\portable\scripts -Recurse
          @'
          Steam HDR Guard Portable Package

          GUI:
            gui\SteamHdrGuard.Gui.exe

          CLI:
            cli\steam-hdr-guard.exe

          This is the portable version. Unzip and run directly.
          '@ | Set-Content .\artifacts\portable\使用说明.txt -Encoding UTF8

      - name: Create portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\artifacts\zip | Out-Null
          Compress-Archive -Path .\artifacts\portable\* -DestinationPath .\artifacts\zip\steam-hdr-guard-portable-win-x64.zip -Force

      - name: Create installer payload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\src\SteamHdrGuard.Setup\Payload | Out-Null
          Compress-Archive -Path .\artifacts\portable\* -DestinationPath .\src\SteamHdrGuard.Setup\Payload\steam-hdr-guard-payload.zip -Force

      - name: Restore installer
        run: dotnet restore .\src\SteamHdrGuard.Setup\SteamHdrGuard.Setup.csproj

      - name: Publish installer
        run: dotnet publish .\src\SteamHdrGuard.Setup\SteamHdrGuard.Setup.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o .\artifacts\installer

      - name: Rename installer
        shell: pwsh
        run: |
          Rename-Item .\artifacts\installer\SteamHdrGuardSetup.exe SteamHdrGuardSetup-win-x64.exe -Force

      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: steam-hdr-guard-portable-win-x64
          path: .\artifacts\zip\steam-hdr-guard-portable-win-x64.zip
          if-no-files-found: error

      - name: Upload installer package
        uses: actions/upload-artifact@v4
        with:
          name: steam-hdr-guard-installer-win-x64
          path: .\artifacts\installer\SteamHdrGuardSetup-win-x64.exe
          if-no-files-found: error
